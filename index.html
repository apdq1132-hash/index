<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tower Defense - Explosive Edition</title>
    <style>
        body { margin: 0; background: #2c3e50; text-align: center; color: white; font-family: Arial, sans-serif; overflow: hidden; touch-action: manipulation; }
        canvas { background: #27ae60; border: 4px solid #2ecc71; margin-top: 10px; max-width: 95%; height: auto; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .ui { font-size: 20px; padding: 10px; background: #34495e; }
        .instructions { font-size: 14px; color: #ecf0f1; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="ui">الذهب: <span id="gold">120</span> | الصحة: <span id="health">10</span></div>
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    <div class="instructions">المدافع تطلق قذائف الآن! (التكلفة: 20 ذهب)</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const towerImg = new Image(); towerImg.src = 'weapon-cannon.png'; 
        const enemyImg = new Image(); enemyImg.src = 'enemy-ufo-c.png'; 

        let gold = 120;
        let health = 10;
        const towers = [];
        const enemies = [];
        const projectiles = []; // قائمة القذائف الجديدة
        const path = [{x: 0, y: 200}, {x: 200, y: 200}, {x: 200, y: 50}, {x: 400, y: 50}, {x: 400, y: 350}, {x: 600, y: 350}];

        function spawnEnemy() {
            if (health > 0) enemies.push({ x: 0, y: 200, hp: 3, pathIndex: 0, shake: 0 });
        }
        setInterval(spawnEnemy, 2500);

        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // رسم الطريق
            ctx.strokeStyle = "#95a5a6"; ctx.lineWidth = 45; ctx.lineCap = "round"; ctx.beginPath();
            ctx.moveTo(path[0].x, path[0].y);
            path.forEach(p => ctx.lineTo(p.x, p.y)); ctx.stroke();

            // تحديث ورسم الأعداء
            enemies.forEach((enemy, index) => {
                let target = path[enemy.pathIndex + 1];
                if (target) {
                    let dx = target.x - enemy.x; let dy = target.y - enemy.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    enemy.x += dx/dist * 1.5; enemy.y += dy/dist * 1.5;
                    if (dist < 5) enemy.pathIndex++;
                } else {
                    enemies.splice(index, 1); health--;
                }
                
                // رسم العدو مع انميشن بسيط (اهتزاز)
                let enemySize = 40 + Math.sin(Date.now() / 200) * 2;
                if (enemyImg.complete) {
                    ctx.drawImage(enemyImg, enemy.x - enemySize/2, enemy.y - enemySize/2, enemySize, enemySize);
                } else {
                    ctx.fillStyle = "red"; ctx.beginPath(); ctx.arc(enemy.x, enemy.y, 15, 0, Math.PI*2); ctx.fill();
                }
            });

            // تحديث ورسم المدافع
            towers.forEach(t => {
                // انميشن المدفع (يكبر قليلاً عند الإطلاق)
                let s = t.recoil > 0 ? 5 : 0;
                if (towerImg.complete) {
                    ctx.drawImage(towerImg, t.x - (25+s), t.y - (25+s), 50+(s*2), 50+(s*2));
                } else {
                    ctx.fillStyle = "#34495e"; ctx.fillRect(t.x - 20, t.y - 20, 40, 40);
                }
                if (t.recoil > 0) t.recoil--;

                // البحث عن عدو لإطلاق القذيفة
                t.cooldown = t.cooldown || 0;
                if (t.cooldown <= 0) {
                    enemies.forEach(enemy => {
                        let dist = Math.sqrt((t.x-enemy.x)**2 + (t.y-enemy.y)**2);
                        if (dist < 150) {
                            projectiles.push({ x: t.x, y: t.y, target: enemy, speed: 5 });
                            t.cooldown = 40; // سرعة الإطلاق
                            t.recoil = 5; // تفعيل انميشن الارتداد
                        }
                    });
                } else { t.cooldown--; }
            });

            // تحديث ورسم القذائف (المفجرات)
            projectiles.forEach((p, pIndex) => {
                let dx = p.target.x - p.x;
                let dy = p.target.y - p.y;
                let dist = Math.sqrt(dx*dx + dy*dy);

                if (dist < 10) { // ملامسة الهدف (انفجار)
                    p.target.hp -= 1;
                    if (p.target.hp <= 0) {
                        let eIdx = enemies.indexOf(p.target);
                        if (eIdx > -1) { enemies.splice(eIdx, 1); gold += 10; }
                    }
                    projectiles.splice(pIndex, 1);
                } else {
                    p.x += (dx/dist) * p.speed;
                    p.y += (dy/dist) * p.speed;
                    // رسم القذيفة (كرة نار صغيرة)
                    ctx.fillStyle = "orange";
                    ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI*2); ctx.fill();
                    ctx.strokeStyle = "red"; ctx.lineWidth = 2; ctx.stroke();
                }
            });

            document.getElementById('gold').innerText = gold;
            document.getElementById('health').innerText = health;

            if (health <= 0) {
                ctx.fillStyle = "rgba(0,0,0,0.8)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "white"; ctx.font = "40px Arial"; ctx.textAlign = "center";
                ctx.fillText("Game Over!", 300, 200);
            } else { requestAnimationFrame(update); }
        }

        canvas.addEventListener('click', function(e) {
            if (gold >= 20) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                towers.push({ 
                    x: (e.clientX - rect.left) * scaleX, 
                    y: (e.clientY - rect.top) * scaleY,
                    cooldown: 0, recoil: 0
                });
                gold -= 20;
            }
        });

        update();
    </script>
</body>
</html>
