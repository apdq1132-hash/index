<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tower Defense Game</title>
    <style>
        body { margin: 0; background: #2c3e50; text-align: center; color: white; font-family: Arial, sans-serif; overflow: hidden; touch-action: manipulation; }
        canvas { background: #27ae60; border: 4px solid #2ecc71; margin-top: 10px; max-width: 95%; height: auto; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .ui { font-size: 20px; padding: 10px; background: #34495e; }
        .instructions { font-size: 14px; color: #ecf0f1; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="ui">الذهب: <span id="gold">120</span> | الصحة: <span id="health">10</span></div>
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    <div class="instructions">اضغط على الطريق لإنشاء مدافع (التكلفة: 20 ذهب)</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // الربط بملفاتك التي رفعتها
        const towerImg = new Image();
        towerImg.src = 'weapon-cannon.png'; 

        const enemyImg = new Image();
        enemyImg.src = 'enemy-ufo-c.png'; 

        const shootSound = new Audio('shoot.mp3'); 
        const dieSound = new Audio('die.mp3');

        let gold = 120; // يبدأ بـ 120 ذهب كما طلبت
        let health = 10;
        const towers = [];
        const enemies = [];
        const path = [{x: 0, y: 200}, {x: 200, y: 200}, {x: 200, y: 50}, {x: 400, y: 50}, {x: 400, y: 350}, {x: 600, y: 350}];

        function spawnEnemy() {
            if (health > 0) enemies.push({ x: 0, y: 200, hp: 3, pathIndex: 0 });
        }
        setInterval(spawnEnemy, 2500);

        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // رسم الطريق
            ctx.strokeStyle = "#95a5a6"; ctx.lineWidth = 45; ctx.lineCap = "round"; ctx.beginPath();
            ctx.moveTo(path[0].x, path[0].y);
            path.forEach(p => ctx.lineTo(p.x, p.y)); ctx.stroke();

            // تحريك ورسم الأعداء
            enemies.forEach((enemy, index) => {
                let target = path[enemy.pathIndex + 1];
                if (target) {
                    let dx = target.x - enemy.x; let dy = target.y - enemy.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    enemy.x += dx/dist * 1.5; enemy.y += dy/dist * 1.5;
                    if (dist < 5) enemy.pathIndex++;
                } else {
                    enemies.splice(index, 1);
                    health--;
                }
                
                // التأكد من رسم العدو (صورة أو مربع أحمر)
                if (enemyImg.complete && enemyImg.naturalWidth !== 0) {
                    ctx.drawImage(enemyImg, enemy.x - 20, enemy.y - 20, 40, 40);
                } else {
                    ctx.fillStyle = "red";
                    ctx.beginPath(); ctx.arc(enemy.x, enemy.y, 15, 0, Math.PI*2); ctx.fill();
                }
            });

            // رسم المدافع
            towers.forEach(t => {
                if (towerImg.complete && towerImg.naturalWidth !== 0) {
                    ctx.drawImage(towerImg, t.x - 25, t.y - 25, 50, 50);
                } else {
                    ctx.fillStyle = "#34495e";
                    ctx.fillRect(t.x - 20, t.y - 20, 40, 40);
                }
                
                enemies.forEach((enemy, eIndex) => {
                    let dist = Math.sqrt((t.x-enemy.x)**2 + (t.y-enemy.y)**2);
                    if (dist < 120) {
                        ctx.strokeStyle = "yellow"; ctx.lineWidth = 2;
                        ctx.beginPath(); ctx.moveTo(t.x, t.y); ctx.lineTo(enemy.x, enemy.y); ctx.stroke();
                        enemy.hp -= 0.05;
                        if (enemy.hp <= 0) { 
                            enemies.splice(eIndex, 1); 
                            gold += 10; 
                            dieSound.play().catch(()=>{});
                        }
                    }
                });
            });

            document.getElementById('gold').innerText = gold;
            document.getElementById('health').innerText = health;

            if (health <= 0) {
                ctx.fillStyle = "rgba(0,0,0,0.8)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "white"; ctx.font = "40px Arial";
                ctx.textAlign = "center";
                ctx.fillText("Game Over!", 300, 200);
            } else {
                requestAnimationFrame(update);
            }
        }

        canvas.addEventListener('click', function(e) {
            if (gold >= 20) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                towers.push({ 
                    x: (e.clientX - rect.left) * scaleX, 
                    y: (e.clientY - rect.top) * scaleY 
                });
                gold -= 20;
                shootSound.play().catch(()=>{});
            }
        });

        update();
    </script>
</body>
</html>
