<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tower Defense Pro</title>
    <style>
        body { margin: 0; background: #2c3e50; text-align: center; color: white; font-family: Arial, sans-serif; overflow: hidden; }
        canvas { background: #27ae60; border: 4px solid #2ecc71; margin-top: 10px; max-width: 95%; height: auto; }
        .ui { font-size: 20px; padding: 10px; background: #34495e; }
    </style>
</head>
<body>
    <div class="ui">الذهب: <span id="gold">120</span> | الصحة: <span id="health">10</span></div>
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    <div style="padding:5px;">ابنِ المدافع على المنصات الدائرية فقط!</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const towerImg = new Image(); towerImg.src = 'weapon-cannon.png'; 
        const enemyImg = new Image(); enemyImg.src = 'enemy-ufo-c.png'; 

        let gold = 120; let health = 10;
        const enemies = []; const projectiles = [];
        const path = [{x: 0, y: 200}, {x: 200, y: 200}, {x: 200, y: 50}, {x: 400, y: 50}, {x: 400, y: 350}, {x: 600, y: 350}];

        // أماكن محددة للبناء (منصات)
        const slots = [
            {x: 100, y: 140, occupied: false, tower: null},
            {x: 270, y: 120, occupied: false, tower: null},
            {x: 330, y: 250, occupied: false, tower: null},
            {x: 470, y: 300, occupied: false, tower: null}
        ];

        function spawnEnemy() {
            if (health > 0) {
                enemies.push({ x: 0, y: 200, hp: 3, pathIndex: 0, speed: 1.5 + (Math.random() * 0.5) });
            }
        }
        setInterval(spawnEnemy, 1800); // زيادة السرعة (كانت 2500)

        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // رسم الطريق
            ctx.strokeStyle = "#95a5a6"; ctx.lineWidth = 45; ctx.lineCap = "round"; ctx.beginPath();
            ctx.moveTo(path[0].x, path[0].y);
            path.forEach(p => ctx.lineTo(p.x, p.y)); ctx.stroke();

            // رسم منصات البناء
            slots.forEach(slot => {
                ctx.fillStyle = slot.occupied ? "transparent" : "rgba(0,0,0,0.2)";
                ctx.beginPath(); ctx.arc(slot.x, slot.y, 25, 0, Math.PI*2); ctx.fill();
                if(!slot.occupied) { ctx.strokeStyle = "white"; ctx.lineWidth = 1; ctx.stroke(); }
            });

            // تحريك ورسم الأعداء
            enemies.forEach((enemy, index) => {
                let target = path[enemy.pathIndex + 1];
                if (target) {
                    let dx = target.x - enemy.x; let dy = target.y - enemy.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    enemy.x += dx/dist * enemy.speed; enemy.y += dy/dist * enemy.speed;
                    if (dist < 5) enemy.pathIndex++;
                } else { enemies.splice(index, 1); health--; }
                
                if (enemyImg.complete) ctx.drawImage(enemyImg, enemy.x - 20, enemy.y - 20, 40, 40);
            });

            // تحديث ورسم المدافع (مع الدوران)
            slots.forEach(slot => {
                if (slot.occupied && slot.tower) {
                    let t = slot.tower;
                    let targetEnemy = null;
                    let minDist = 150;

                    // البحث عن أقرب عدو
                    enemies.forEach(e => {
                        let d = Math.sqrt((slot.x-e.x)**2 + (slot.y-e.y)**2);
                        if (d < minDist) { minDist = d; targetEnemy = e; }
                    });

                    if (targetEnemy) {
                        // حساب زاوية الدوران باتجاه العدو
                        t.angle = Math.atan2(targetEnemy.y - slot.y, targetEnemy.x - slot.x);
                        
                        // الإطلاق
                        if (t.cooldown <= 0) {
                            projectiles.push({ x: slot.x, y: slot.y, target: targetEnemy, speed: 6 });
                            t.cooldown = 35; t.recoil = 5;
                        }
                    }
                    if (t.cooldown > 0) t.cooldown--;
                    if (t.recoil > 0) t.recoil--;

                    // رسم المدفع مع الدوران
                    ctx.save();
                    ctx.translate(slot.x, slot.y);
                    ctx.rotate(t.angle); // هذا هو كود الدوران حسب حركة العدو
                    let s = t.recoil > 0 ? 5 : 0;
                    if (towerImg.complete) ctx.drawImage(towerImg, -(25+s), -(25+s), 50+(s*2), 50+(s*2));
                    ctx.restore();
                }
            });

            // القذائف
            projectiles.forEach((p, pIndex) => {
                let dx = p.target.x - p.x; let dy = p.target.y - p.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < 10) {
                    p.target.hp -= 1;
                    if (p.target.hp <= 0) { 
                        let eIdx = enemies.indexOf(p.target);
                        if(eIdx > -1) { enemies.splice(eIdx, 1); gold += 10; }
                    }
                    projectiles.splice(pIndex, 1);
                } else {
                    p.x += (dx/dist) * p.speed; p.y += (dy/dist) * p.speed;
                    ctx.fillStyle = "orange"; ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI*2); ctx.fill();
                }
            });

            document.getElementById('gold').innerText = gold;
            document.getElementById('health').innerText = health;
            if (health > 0) requestAnimationFrame(update);
        }

        canvas.addEventListener('click', function(e) {
            const rect = canvas.getBoundingClientRect();
            const mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
            const mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);

            // تحقق إذا ضغط اللاعب على منصة فارغة
            slots.forEach(slot => {
                let d = Math.sqrt((mouseX-slot.x)**2 + (mouseY-slot.y)**2);
                if (d < 30 && !slot.occupied && gold >= 20) {
                    slot.occupied = true;
                    slot.tower = { angle: 0, cooldown: 0, recoil: 0 };
                    gold -= 20;
                }
            });
        });

        update();
    </script>
</body>
</html>
